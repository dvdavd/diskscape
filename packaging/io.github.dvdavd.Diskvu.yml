app-id: io.github.dvdavd.Diskvu
runtime: org.kde.Platform
runtime-version: "6.9"
sdk: org.kde.Sdk
command: diskvu

finish-args:
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --filesystem=host
  - --talk-name=org.freedesktop.FileManager1

modules:
  - name: diskvu
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DCMAKE_SKIP_INSTALL_ALL_DEPENDENCY=TRUE
    make-args:
      - diskvu
    sources:
      - type: dir
        path: ..
